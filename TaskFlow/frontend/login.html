<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background:#0f172a;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="absolute inset-0 bg-gradient-to-br from-blue-600/20 via-slate-900 to-black"></div>

    <div class="relative w-full max-w-md p-8 rounded-3xl bg-white/10 backdrop-blur-xl border border-white/10 shadow-2xl">

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-white">
                TaskFlow
            </h1>

            <p class="text-slate-300 mt-2">
                Project Management Made Easy
            </p>

        </div>

        <form id="loginForm" class="space-y-5">

            <div>

                <label class="text-slate-300 text-sm">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    class="w-full mt-2 p-3 rounded-xl bg-slate-800 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >

            </div>

            <div>

                <label class="text-slate-300 text-sm">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    class="w-full mt-2 p-3 rounded-xl bg-slate-800 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >

            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition"
            >
                Login
            </button>

        </form>

        <p class="text-center text-slate-400 mt-6">

            Don't have an account?

            <a href="register.html" class="text-blue-400 hover:underline">
                Register
            </a>

        </p>

    </div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{

        const response = await fetch("http://localhost:8000/api/auth/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email,
                password
            })

        });

        const data = await response.json();

        if(data.success){

            localStorage.setItem("token",data.token);
            localStorage.setItem("user",JSON.stringify(data.user));

            alert("Login Successful!");

            window.location.href="dashboard.html";

        }else{

            alert(data.message);

        }

    }catch(error){

        console.error(error);

        alert("Server Error");

    }

});

</script>

</body>
</html>
