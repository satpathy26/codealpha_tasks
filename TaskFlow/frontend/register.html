<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow | Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}
</style>

</head>
<body class="min-h-screen flex items-center justify-center">

<div class="absolute inset-0 bg-gradient-to-br from-blue-600/20 via-slate-900 to-black"></div>

<div class="relative w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl p-8">

<div class="text-center mb-8">

<h1 class="text-4xl font-bold text-white">
TaskFlow
</h1>

<p class="text-slate-300 mt-2">
Create your account
</p>

</div>

<form id="registerForm" class="space-y-5">

<div>

<label class="text-slate-300 text-sm">
Username
</label>

<input
type="text"
id="username"
class="w-full mt-2 p-3 rounded-xl bg-slate-800 text-white border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none"
placeholder="Enter username"
required>

</div>

<div>

<label class="text-slate-300 text-sm">
Email
</label>

<input
type="email"
id="email"
class="w-full mt-2 p-3 rounded-xl bg-slate-800 text-white border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none"
placeholder="Enter email"
required>

</div>

<div>

<label class="text-slate-300 text-sm">
Password
</label>

<input
type="password"
id="password"
class="w-full mt-2 p-3 rounded-xl bg-slate-800 text-white border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none"
placeholder="Enter password"
required>

</div>

<button
class="w-full bg-blue-600 hover:bg-blue-700 transition rounded-xl py-3 text-white font-semibold">

Create Account

</button>

</form>

<p class="text-center text-slate-400 mt-6">

Already have an account?

<a href="login.html" class="text-blue-400 hover:underline">

Login

</a>

</p>

</div>

<script>

const form=document.getElementById("registerForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const username=document.getElementById("username").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const response=await fetch("http://localhost:8000/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
email,
password
})

});

const data=await response.json();

if(data.success){

alert("Registration Successful");

window.location.href="login.html";

}else{

alert(data.message);

}

}catch(error){

console.log(error);

alert("Server Error");

}

});

</script>

</body>
</html>
