<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f3f4f6;
    color:#111827;
}

.navbar{
    background:#ffffff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 6%;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    position:sticky;
    top:0;
    z-index:100;
}

.navbar-brand{
    font-size:28px;
    font-weight:700;
    color:#111827;
    letter-spacing:-.5px;
}

.cart-btn{
    background:#111827;
    color:#fff;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.cart-btn:hover{
    background:#2563eb;
}

/* ==========================
   Main Container
========================== */

.main-content{
    max-width:1300px;
    margin:auto;
    padding:40px 20px;
}

.page-title{
    font-size:36px;
    margin-bottom:35px;
    color:#111827;
    font-weight:700;
}


#products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.product{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    transition:.35s ease;
    display:flex;
    flex-direction:column;
    border:1px solid #e5e7eb;
    cursor:pointer;
}

.product:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 35px rgba(0,0,0,.12);
}

/* ==========================
   Product Image
========================== */

.product-image{
    width:100%;
    height:250px;
    object-fit:contain;
    padding:20px;
    background:#fff;
    transition:.35s;
}

.product:hover .product-image{
    transform:scale(1.08);
}

/* ==========================
   Placeholder
========================== */

.product-image-placeholder{
    width:100%;
    height:250px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8fafc;
    color:#94a3b8;
    font-size:15px;
}

/* ==========================
   Product Details
========================== */

.product-details{
    padding:20px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.product h3{
    font-size:22px;
    font-weight:700;
    color:#111827;
    margin-bottom:8px;
}

.product p{
    color:#6b7280;
    font-size:15px;
    line-height:1.6;
    margin-bottom:15px;
    flex:1;
}

/* ==========================
   Rating
========================== */

.rating{
    color:#f59e0b;
    font-size:15px;
    margin-bottom:10px;
}

.rating span{
    color:#6b7280;
}

/* ==========================
   Delivery Text
========================== */

.delivery{
    color:#059669 !important;
    font-weight:600;
    font-size:14px;
    margin-bottom:20px;
}

/* ==========================
   Price Row
========================== */

.price-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:auto;
}

.product h4{
    font-size:30px;
    color:#111827;
    font-weight:700;
}

/* ==========================
   Button
========================== */

.view-btn{
    background:#111827;
    color:#fff;
    text-decoration:none;
    padding:11px 18px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.view-btn:hover{
    background:#2563eb;
}

/* ==========================
   Responsive
========================== */

@media(max-width:768px){

    .navbar{
        padding:15px;
    }

    .navbar-brand{
        font-size:22px;
    }

    .page-title{
        font-size:28px;
    }

    .product-image{
        height:220px;
    }

}</style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Nexus Store</div>
        <a href="cart.html" class="cart-btn">
            🛒 View Cart
        </a>
    </nav>

    <main class="main-content">
        <h1 class="page-title">Featured Products</h1>
        <div id="products"></div>
    </main>

    <script>
        fetch("http://localhost:3000/api/products")
        .then(res => res.json())
        .then(products => {
            const container = document.getElementById("products");

            products.forEach(product => {
                
                const imageHtml = product.image_url
    ? `<img src="${product.image_url}"
            alt="${product.name}"
            class="product-image">`
    : `<div class="product-image-placeholder">No Image</div>`;

                container.innerHTML += `
<div class="product">

    ${imageHtml}

    <div class="product-details">

        <h3>${product.name}</h3>

        <p>${product.description}</p>

        <div class="delivery">
            🚚 Free Delivery
        </div>

        <div class="price-row">

            <h4>₹${product.price}</h4>

            <a href="product.html?id=${product.id}" class="view-btn">
                View Details
            </a>

        </div>

    </div>

</div>
`;
            });
        })
        .catch(error => {
            console.log(error);
        });
    </script>

</body>
</html>
